services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: python_app

    working_dir: /app

    volumes:
      - .:/app

    command: uv run python src/app_name/main.py

    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    tty: true